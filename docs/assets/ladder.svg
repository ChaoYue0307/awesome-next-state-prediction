<svg viewBox="0 0 1000 560" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect x="2" y="2" width="996" height="556" rx="20" fill="#0E1117" stroke="#2A3038" stroke-width="2"/>
  <text x="40" y="46" fill="#E6EDF3" font-size="22" font-weight="700">The Next&#8209;State Ladder</text>
  <text x="40" y="70" fill="#9DA7B3" font-size="13.5">how far does &#8220;predict the next ___&#8221; reach? — from a word, to a world you can act in</text>

  <!-- staircase bars -->
  <g>
    <rect x="70"  y="478" width="138" height="32"  rx="8" fill="#6E6E68"/>
    <rect x="224" y="412" width="138" height="98"  rx="8" fill="#5E7F73"/>
    <rect x="378" y="346" width="138" height="164" rx="8" fill="#4C8F7C"/>
    <rect x="532" y="280" width="138" height="230" rx="8" fill="#2E9E78"/>
    <rect x="686" y="214" width="138" height="296" rx="8" fill="#1AA079"/>
    <rect x="840" y="148" width="138" height="362" rx="8" fill="#10B07F"/>
  </g>

  <!-- dashed trend line over the tops -->
  <polyline points="139,478 293,412 447,346 601,280 755,214 909,148" fill="none" stroke="#5DCAA5" stroke-width="2" stroke-dasharray="3 5" opacity="0.7"/>
  <path d="M903 156 L909 144 L917 154 Z" fill="#5DCAA5"/>

  <!-- per-level labels (above each bar) -->
  <g text-anchor="middle">
    <!-- L0 -->
    <text x="139" y="424" fill="#E6EDF3" font-size="21" font-weight="700">L0</text>
    <text x="139" y="445" fill="#C9D1D9" font-size="13" font-weight="600">next token</text>
    <text x="139" y="463" fill="#85B7EB" font-size="12" font-style="italic">LLMs</text>
    <!-- L1 -->
    <text x="293" y="358" fill="#E6EDF3" font-size="21" font-weight="700">L1</text>
    <text x="293" y="379" fill="#C9D1D9" font-size="13" font-weight="600">token &#8658; latent world</text>
    <text x="293" y="397" fill="#85B7EB" font-size="12" font-style="italic">Othello&#8209;GPT</text>
    <!-- L2 -->
    <text x="447" y="292" fill="#E6EDF3" font-size="21" font-weight="700">L2</text>
    <text x="447" y="313" fill="#C9D1D9" font-size="13" font-weight="600">next frame (passive)</text>
    <text x="447" y="331" fill="#F0997B" font-size="12" font-style="italic">Sora · I&#8209;JEPA</text>
    <!-- L3 -->
    <text x="601" y="226" fill="#E6EDF3" font-size="21" font-weight="700">L3</text>
    <text x="601" y="247" fill="#C9D1D9" font-size="13" font-weight="600">frame | action</text>
    <text x="601" y="265" fill="#F0997B" font-size="12" font-style="italic">GameNGen</text>
    <!-- L4 -->
    <text x="755" y="160" fill="#E6EDF3" font-size="21" font-weight="700">L4</text>
    <text x="755" y="181" fill="#C9D1D9" font-size="13" font-weight="600">latent | action</text>
    <text x="755" y="199" fill="#5DCAA5" font-size="12" font-style="italic">Dreamer · Genie</text>
    <!-- L5 -->
    <text x="909" y="94" fill="#E6EDF3" font-size="21" font-weight="700">L5</text>
    <text x="909" y="115" fill="#C9D1D9" font-size="13" font-weight="600">abstract state</text>
    <text x="909" y="133" fill="#5DCAA5" font-size="12" font-style="italic">MuZero · Genie 3</text>
  </g>

  <!-- captions inside bars -->
  <g text-anchor="middle" font-size="11.5" fill="#0E1117" font-weight="600" opacity="0.75">
    <text x="447" y="372">point of emergence</text>
    <text x="601" y="306">controllable</text>
    <text x="755" y="240">plannable</text>
    <text x="909" y="174">general · real&#8209;time</text>
  </g>

  <text x="40" y="540" fill="#8A929C" font-size="13" font-style="italic">Each rung adds one thing: a latent state (L1), a richer observation (L2), an action (L3), abstraction (L4), then generality (L5).</text>
</svg>
